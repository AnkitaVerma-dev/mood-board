<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MoodBoard Pro</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="login-container">

    <h1>MoodBoard Pro ✨</h1>

    <p class="tagline">
      Save your moods & memories beautifully
    </p>

    <input type="text"
           id="username"
           placeholder="Enter your name">

    <input type="password"
           id="password"
           placeholder="Enter password">

    <button onclick="loginUser()">
      Login
    </button>

  </div>

  <script src="login.js"></script>

</body>
</html>
